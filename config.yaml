# ============================================================
# config.yaml
# Sarcasm-Aware Sentiment Analysis Project
# All paths, hyperparameters, and seeds live here.
# ============================================================

# Reproducibility
seed: 42

# Paths - data lives outside the repo
paths:
  data_root: /home/ubuntu/raw
  sarc_dir: /home/ubuntu/raw/sarc
  twitter_dir: /home/ubuntu/raw/twitter
  saved_models: /home/ubuntu/Final-Project-Group4/saved_models
  results: /home/ubuntu/Final-Project-Group4/outputs/results
  plots: /home/ubuntu/Final-Project-Group4/outputs/plots
  logs: /home/ubuntu/Final-Project-Group4/outputs/logs

# Data loading options
data:
  # Subsample for faster iteration. Set to null to use full dataset.
  sarc_train_sample: null
  sarc_test_sample: null
  twitter_train_sample: null
  twitter_test_sample: null
  val_split: 0.1
  debug_sample: 1000  # small sample for smoke-testing scripts

# Preprocessing options
preprocessing:
  lowercase: true
  remove_urls: true
  remove_mentions: true
  remove_special_chars: false
  min_text_length: 3
  max_text_length: 300

# Classical model options
classical:
  tfidf_max_features: 10000
  tfidf_ngram_range: [1, 2]
  models:
    - logistic_regression
    - linear_svm
    - naive_bayes

# LSTM options
lstm:
  embedding_dim: 128
  hidden_dim: 128
  num_layers: 2
  dropout: 0.3
  bidirectional: true
  max_vocab_size: 20000
  max_seq_length: 100
  batch_size: 64
  learning_rate: 0.001
  epochs: 5

# DistilBERT options
distilbert:
  model_name: distilbert-base-uncased
  max_seq_length: 128
  batch_size: 32
  learning_rate: 0.00002
  epochs: 3
  warmup_ratio: 0.1
  weight_decay: 0.01

# Contrast detection options (novel feature)
contrast:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  clause_split_pattern: "[,.;!?]"
  min_clauses: 2

# Interpretability options
interpretability:
  lime_num_features: 10
  lime_num_samples: 500
  shap_background_samples: 100
  shap_num_samples: 50
